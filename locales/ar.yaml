# Hermes static-message catalog -- Arabic (العربية)
#
# Mirrors locales/en.yaml key-for-key.  Only user-facing static prose is
# translated: command names, /slash commands, config keys, paths, URLs, model
# IDs, provider names, emojis and {placeholder} tokens are kept verbatim so
# interpolation and identifiers keep working.  tests/agent/test_i18n.py asserts
# key parity and placeholder parity against en.yaml.

